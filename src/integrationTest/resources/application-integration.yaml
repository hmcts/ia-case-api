
spring:
  retry:
    max-attempts: 100
  datasource:
    driverClassName: org.h2.Driver
    url: jdbc:h2:mem:ia_case_api;NON_KEYWORDS=YEAR
    username: sa
    password:
  flyway.enabled: true
  sql.init.platform: h2
  autoconfigure:
    exclude:
          - org.springframework.boot.autoconfigure.cache.CacheAutoConfiguration
          - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
          - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

appealReferenceSequenceSeed: 50000

featureFlag:
  timedEventServiceEnabled: true
idam:
  s2s-authorised:
    services: ia
ccdGatewayUrl: ${CCD_GW_URL:http://localhost:3453}
document_management.url: ${DM_URL:http://127.0.0.1:4506}

app:
  cache:
    enabled: false
